<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舆情仿真实时监控</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .status-bar {
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: #10b981;
        }

        .status-indicator.disconnected {
            background: #ef4444;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-weight: 600;
            color: #374151;
        }

        .stats-value {
            color: #6366f1;
            font-weight: bold;
            font-size: 1.1em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            margin-bottom: 15px;
            color: #1f2937;
            font-size: 1.3em;
            border-bottom: 2px solid #6366f1;
            padding-bottom: 10px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .metric-row:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #6b7280;
            font-weight: 500;
        }

        .metric-value {
            color: #1f2937;
            font-weight: 700;
            font-size: 1.1em;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 15px;
        }

        .large-chart {
            grid-column: 1 / -1;
        }

        .large-chart .chart-container {
            height: 400px;
        }

        .event-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .event-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #f3f4f6;
            border-radius: 6px;
            border-left: 4px solid #6366f1;
            font-size: 0.9em;
        }

        .event-time {
            color: #6b7280;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .event-content {
            color: #1f2937;
        }

        .contribution-bar {
            display: flex;
            height: 30px;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }

        .contribution-segment {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .contribution-segment:hover {
            filter: brightness(1.1);
        }

        .segment-mu {
            background: #8b5cf6;
        }

        .segment-internal {
            background: #3b82f6;
        }

        .segment-external {
            background: #10b981;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .status-bar {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        .no-data {
            text-align: center;
            color: #9ca3af;
            padding: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 舆情仿真实时监控系统</h1>
        
        <div class="status-bar">
            <div class="status-item">
                <div class="status-indicator" id="connectionStatus"></div>
                <span class="status-text" id="connectionText">连接中...</span>
            </div>
            <div class="status-item">
                <span class="status-text">当前步数:</span>
                <span class="stats-value" id="currentStep">0</span>
            </div>
            <div class="status-item">
                <span class="status-text">当前时间:</span>
                <span class="stats-value" id="currentTime">--</span>
            </div>
            <div class="status-item">
                <span class="status-text">激活智能体:</span>
                <span class="stats-value" id="activatedAgents">0</span>
            </div>
            <div class="status-item">
                <span class="status-text">总行为数:</span>
                <span class="stats-value" id="totalActions">0</span>
            </div>
        </div>

        <div class="grid">
            <!-- 霍克斯强度分解 -->
            <div class="card">
                <h2>⚡ 霍克斯强度分解</h2>
                <div class="metric-row">
                    <span class="metric-label">总强度 λ(t)</span>
                    <span class="metric-value" id="totalIntensity">0.0000</span>
                </div>
                <div class="contribution-bar" id="contributionBar">
                    <div class="contribution-segment segment-mu" style="width: 33%">μ</div>
                    <div class="contribution-segment segment-internal" style="width: 33%">内部</div>
                    <div class="contribution-segment segment-external" style="width: 34%">外部</div>
                </div>
                <div class="metric-row">
                    <span class="metric-label">基础强度 μ</span>
                    <span class="metric-value" id="muValue">0.0000</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">内部贡献</span>
                    <span class="metric-value" id="internalContribution">0.0000</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">外部贡献</span>
                    <span class="metric-value" id="externalContribution">0.0000</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">昼夜节律系数</span>
                    <span class="metric-value" id="circadianFactor">1.000</span>
                </div>
            </div>

            <!-- 行为统计 -->
            <div class="card">
                <h2>📊 行为统计</h2>
                <div class="metric-row">
                    <span class="metric-label">发博数</span>
                    <span class="metric-value" id="postCount">0</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">转发数</span>
                    <span class="metric-value" id="repostCount">0</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">评论数</span>
                    <span class="metric-value" id="commentCount">0</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">点赞数</span>
                    <span class="metric-value" id="likeCount">0</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">核心行为总数</span>
                    <span class="metric-value" id="coreActionsSum">0</span>
                </div>
            </div>

            <!-- 事件统计 -->
            <div class="card">
                <h2>🎯 事件统计</h2>
                <div class="metric-row">
                    <span class="metric-label">内部事件数</span>
                    <span class="metric-value" id="internalEvents">0</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">外部事件数</span>
                    <span class="metric-value" id="externalEvents">0</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">噪声添加</span>
                    <span class="metric-value" id="noiseAdded">0.00</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">已耗时间(分钟)</span>
                    <span class="metric-value" id="elapsedMinutes">0</span>
                </div>
            </div>

            <!-- 外部事件列表 -->
            <div class="card">
                <h2>📰 外部事件</h2>
                <div class="event-list" id="externalEventsList">
                    <div class="no-data">暂无外部事件</div>
                </div>
            </div>

            <!-- 强度时间序列图 -->
            <div class="card large-chart">
                <h2>📈 霍克斯强度时间序列</h2>
                <div class="chart-container">
                    <canvas id="intensityChart"></canvas>
                </div>
            </div>

            <!-- 激活人数时间序列图 -->
            <div class="card large-chart">
                <h2>👥 激活智能体数量时间序列</h2>
                <div class="chart-container">
                    <canvas id="activationChart"></canvas>
                </div>
            </div>

            <!-- 行为数量时间序列图 -->
            <div class="card large-chart">
                <h2>🎬 行为数量时间序列</h2>
                <div class="chart-container">
                    <canvas id="actionsChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // WebSocket连接
        let ws = null;
        let reconnectInterval = null;
        const WS_URL = 'ws://localhost:8765';
        
        // 数据存储
        const dataHistory = {
            steps: [],
            intensity: [],
            internalContribution: [],
            externalContribution: [],
            activatedCount: [],
            actionsCount: [],
            postCount: [],
            repostCount: [],
            commentCount: []
        };
        
        const MAX_HISTORY = 500; // 最多保存500个数据点

        // 图表配置
        const chartOptions = {
            responsive: true,
            maintainAspectRatio: false,
            animation: {
                duration: 0
            },
            scales: {
                x: {
                    type: 'linear',
                    display: true,
                    title: {
                        display: true,
                        text: '步数'
                    },
                    ticks: {
                        maxTicksLimit: 20
                    }
                },
                y: {
                    display: true,
                    beginAtZero: true
                }
            },
            plugins: {
                legend: {
                    display: true,
                    position: 'top'
                },
                tooltip: {
                    callbacks: {
                        title: function(context) {
                            const index = context[0].dataIndex;
                            const step = dataHistory.steps[index];
                            if (step !== undefined) {
                                return `步数: ${step}`;
                            }
                            return `数据点: ${index}`;
                        }
                    }
                }
            }
        };

        // 初始化图表
        const intensityChart = new Chart(
            document.getElementById('intensityChart'),
            {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: '总强度',
                            data: [],
                            borderColor: '#8b5cf6',
                            backgroundColor: 'rgba(139, 92, 246, 0.1)',
                            tension: 0.4
                        },
                        {
                            label: '内部贡献',
                            data: [],
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            tension: 0.4
                        },
                        {
                            label: '外部贡献',
                            data: [],
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    ...chartOptions,
                    scales: {
                        ...chartOptions.scales,
                        y: {
                            ...chartOptions.scales.y,
                            title: {
                                display: true,
                                text: '强度'
                            }
                        }
                    }
                }
            }
        );

        const activationChart = new Chart(
            document.getElementById('activationChart'),
            {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '激活智能体数',
                        data: [],
                        borderColor: '#f59e0b',
                        backgroundColor: 'rgba(245, 158, 11, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    ...chartOptions,
                    scales: {
                        ...chartOptions.scales,
                        y: {
                            ...chartOptions.scales.y,
                            title: {
                                display: true,
                                text: '人数'
                            }
                        }
                    }
                }
            }
        );

        const actionsChart = new Chart(
            document.getElementById('actionsChart'),
            {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: '总行为数',
                            data: [],
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            tension: 0.4
                        },
                        {
                            label: '发博数',
                            data: [],
                            borderColor: '#8b5cf6',
                            backgroundColor: 'rgba(139, 92, 246, 0.1)',
                            tension: 0.4
                        },
                        {
                            label: '转发数',
                            data: [],
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            tension: 0.4
                        },
                        {
                            label: '评论数',
                            data: [],
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    ...chartOptions,
                    scales: {
                        ...chartOptions.scales,
                        y: {
                            ...chartOptions.scales.y,
                            title: {
                                display: true,
                                text: '数量'
                            }
                        }
                    }
                }
            }
        );

        // 连接WebSocket
        function connectWebSocket() {
            try {
                ws = new WebSocket(WS_URL);
                
                ws.onopen = () => {
                    console.log('WebSocket连接成功');
                    updateConnectionStatus(true);
                    if (reconnectInterval) {
                        clearInterval(reconnectInterval);
                        reconnectInterval = null;
                    }
                };
                
                ws.onmessage = (event) => {
                    const message = JSON.parse(event.data);
                    
                    if (message.type === 'signal') {
                        updateUI(message.data);
                    } else if (message.type === 'history') {
                        // 加载历史数据
                        if (Array.isArray(message.data)) {
                            message.data.forEach(signal => updateUI(signal, true));
                            // 批量更新结束后刷新图表
                            updateCharts();
                        }
                    }
                };
                
                ws.onerror = (error) => {
                    console.error('WebSocket错误:', error);
                    updateConnectionStatus(false);
                };
                
                ws.onclose = () => {
                    console.log('WebSocket连接关闭');
                    updateConnectionStatus(false);
                    // 尝试重连
                    if (!reconnectInterval) {
                        reconnectInterval = setInterval(() => {
                            console.log('尝试重新连接...');
                            connectWebSocket();
                        }, 3000);
                    }
                };
            } catch (error) {
                console.error('连接失败:', error);
                updateConnectionStatus(false);
            }
        }

        // 更新连接状态
        function updateConnectionStatus(connected) {
            const indicator = document.getElementById('connectionStatus');
            const text = document.getElementById('connectionText');
            
            if (connected) {
                indicator.classList.add('connected');
                indicator.classList.remove('disconnected');
                text.textContent = '已连接';
            } else {
                indicator.classList.add('disconnected');
                indicator.classList.remove('connected');
                text.textContent = '未连接';
            }
        }

        // 更新UI
        function updateUI(signal, isBatch = false) {
            // 更新状态栏
            document.getElementById('currentStep').textContent = signal.step || 0;
            document.getElementById('currentTime').textContent = signal.time || '--';
            document.getElementById('activatedAgents').textContent = signal.activated_count || 0;
            document.getElementById('totalActions').textContent = signal.actions_count || 0;

            // 更新霍克斯强度
            const intensity = signal.hawkes_intensity || 0;
            const mu = signal.hawkes_mu || 0;
            const internalContrib = signal.hawkes_internal_contribution || 0;
            const externalContrib = signal.hawkes_external_contribution || 0;
            
            document.getElementById('totalIntensity').textContent = intensity.toFixed(6);
            document.getElementById('muValue').textContent = mu.toFixed(6);
            document.getElementById('internalContribution').textContent = internalContrib.toFixed(6);
            document.getElementById('externalContribution').textContent = externalContrib.toFixed(6);
            document.getElementById('circadianFactor').textContent = (signal.hawkes_circadian_factor || 1).toFixed(3);

            // 更新贡献条
            updateContributionBar(mu, internalContrib, externalContrib, intensity);

            // 更新行为统计
            document.getElementById('postCount').textContent = signal.post_count || 0;
            document.getElementById('repostCount').textContent = signal.repost_count || 0;
            document.getElementById('commentCount').textContent = signal.comment_count || 0;
            document.getElementById('likeCount').textContent = signal.like_count || 0;
            const coreSum = (signal.post_count || 0) + (signal.repost_count || 0) + (signal.comment_count || 0);
            document.getElementById('coreActionsSum').textContent = coreSum;

            // 更新事件统计
            document.getElementById('internalEvents').textContent = signal.internal_events_count || 0;
            document.getElementById('externalEvents').textContent = signal.external_events_count || 0;
            document.getElementById('noiseAdded').textContent = (signal.noise_added || 0).toFixed(2);
            document.getElementById('elapsedMinutes').textContent = (signal.elapsed_minutes || 0).toFixed(1);

            // 更新外部事件列表
            if (signal.external_events_triggered && signal.external_events_triggered.length > 0) {
                updateExternalEventsList(signal.external_events_triggered, signal.time);
            }

            // 更新历史数据和图表
            if (dataHistory.steps.length >= MAX_HISTORY) {
                // 移除最旧的数据
                dataHistory.steps.shift();
                dataHistory.intensity.shift();
                dataHistory.internalContribution.shift();
                dataHistory.externalContribution.shift();
                dataHistory.activatedCount.shift();
                dataHistory.actionsCount.shift();
                dataHistory.postCount.shift();
                dataHistory.repostCount.shift();
                dataHistory.commentCount.shift();
            }

            dataHistory.steps.push(signal.step || 0);
            dataHistory.intensity.push(intensity);
            dataHistory.internalContribution.push(internalContrib);
            dataHistory.externalContribution.push(externalContrib);
            dataHistory.activatedCount.push(signal.activated_count || 0);
            dataHistory.actionsCount.push(signal.actions_count || 0);
            dataHistory.postCount.push(signal.post_count || 0);
            dataHistory.repostCount.push(signal.repost_count || 0);
            dataHistory.commentCount.push(signal.comment_count || 0);

            // 只在非批量模式或批量结束时更新图表
            if (!isBatch) {
                updateCharts();
            }
        }

        // 更新贡献条
        function updateContributionBar(mu, internal, external, total) {
            if (total <= 0) {
                return;
            }

            const muPercent = (mu / total) * 100;
            const internalPercent = (internal / total) * 100;
            const externalPercent = (external / total) * 100;

            const bar = document.getElementById('contributionBar');
            bar.innerHTML = '';

            if (muPercent > 0) {
                const muDiv = document.createElement('div');
                muDiv.className = 'contribution-segment segment-mu';
                muDiv.style.width = `${muPercent}%`;
                muDiv.textContent = muPercent > 5 ? `μ ${muPercent.toFixed(1)}%` : '';
                muDiv.title = `基础强度: ${mu.toFixed(6)}(${muPercent.toFixed(2)}%)`;
                bar.appendChild(muDiv);
            }

            if (internalPercent > 0) {
                const internalDiv = document.createElement('div');
                internalDiv.className = 'contribution-segment segment-internal';
                internalDiv.style.width = `${internalPercent}%`;
                internalDiv.textContent = internalPercent > 5 ? `内部 ${internalPercent.toFixed(1)}%` : '';
                internalDiv.title = `内部贡献: ${internal.toFixed(6)} (${internalPercent.toFixed(2)}%)`;
                bar.appendChild(internalDiv);
            }

            if (externalPercent > 0) {
                const externalDiv = document.createElement('div');
                externalDiv.className = 'contribution-segment segment-external';
                externalDiv.style.width = `${externalPercent}%`;
                externalDiv.textContent = externalPercent > 5 ? `外部 ${externalPercent.toFixed(1)}%` : '';
                externalDiv.title = `外部贡献: ${external.toFixed(6)} (${externalPercent.toFixed(2)}%)`;
                bar.appendChild(externalDiv);
            }
        }

        // 更新外部事件列表
        function updateExternalEventsList(events, time) {
            const list = document.getElementById('externalEventsList');
            
            events.forEach(eventContent => {
                const item = document.createElement('div');
                item.className = 'event-item';
                item.innerHTML = `
                    <div class="event-time">${time}</div>
                    <div class="event-content">${eventContent}</div>
                `;
                list.insertBefore(item, list.firstChild);
            });

            // 限制显示数量
            while (list.children.length > 20) {
                list.removeChild(list.lastChild);
            }

            // 移除"暂无数据"提示
            const noData = list.querySelector('.no-data');
            if (noData) {
                noData.remove();
            }
        }

        // 更新图表
        function updateCharts() {
            const n = dataHistory.steps.length;
            if (n === 0) return;
            
            // 检查step值是否连续且唯一
            const steps = dataHistory.steps;
            const isSequential = steps.every((step, i) => i === 0 || step > steps[i-1]);
            const hasDuplicates = new Set(steps).size !== steps.length;
            
            // 如果有重复或非连续，使用索引；否则使用step值
            const labels = (isSequential && !hasDuplicates) ? steps : Array.from({length: n}, (_, i) => i);
            
            // 强度图表
            intensityChart.data.labels = labels;
            intensityChart.data.datasets[0].data = dataHistory.intensity;
            intensityChart.data.datasets[1].data = dataHistory.internalContribution;
            intensityChart.data.datasets[2].data = dataHistory.externalContribution;
            intensityChart.update('none');

            // 激活数图表
            activationChart.data.labels = labels;
            activationChart.data.datasets[0].data = dataHistory.activatedCount;
            activationChart.update('none');

            // 行为数图表
            actionsChart.data.labels = labels;
            actionsChart.data.datasets[0].data = dataHistory.actionsCount;
            actionsChart.data.datasets[1].data = dataHistory.postCount;
            actionsChart.data.datasets[2].data = dataHistory.repostCount;
            actionsChart.data.datasets[3].data = dataHistory.commentCount;
            actionsChart.update('none');
        }

        // 页面加载时连接
        window.addEventListener('load', () => {
            connectWebSocket();
        });

        // 页面卸载时断开连接
        window.addEventListener('beforeunload', () => {
            if (ws) {
                ws.close();
            }
        });
    </script>
</body>
</html>
